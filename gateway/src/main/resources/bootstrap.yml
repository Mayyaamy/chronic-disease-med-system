spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
    gateway:
      routes:
        # 路由规则：匹配 /user/** /patient/** 全部转发到 auth-service
        - id: route-auth
          uri: lb://auth-service
          predicates:
            - Path=/user/**,/patient/**,/follow/**,/medicineOrder/**,/nacos/config/**,/feign/test/**
server:
  port: 80